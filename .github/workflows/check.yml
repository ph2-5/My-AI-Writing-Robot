name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + Type + Python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: python -c "from main import demo; result = demo(); assert result.get('success'), 'Demo failed'"
