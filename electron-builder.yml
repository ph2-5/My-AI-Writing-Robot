appId: com.aiwritingrobot.app
productName: AI写字机器人
directories:
  output: release-build
files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!dist/win-unpacked"
  - "!dist/*.exe"
  - "!dist/*.blockmap"
  - "!dist/latest.yml"
  - "!dist/builder-debug.yml"
extraResources:
  - from: main.py
    to: python/main.py
  - from: config.py
    to: python/config.py
  - from: logging_utils.py
    to: python/logging_utils.py
  - from: requirements.txt
    to: python/requirements.txt
  - from: analyzers
    to: python/analyzers
  - from: effects
    to: python/effects
  - from: fonts
    to: python/fonts
  - from: layout
    to: python/layout
  - from: output
    to: python/output
  - from: parsers
    to: python/parsers
  - from: symbols
    to: python/symbols
  - from: scripts
    to: python/scripts
  - from: electron/server.py
    to: python/server.py
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  forceCodeSigning: false
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AI写字机器人
nodeGypRebuild: false
npmRebuild: false
buildDependenciesFromSource: false
